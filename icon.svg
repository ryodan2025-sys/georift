<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#050810" rx="80"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00f5ff" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#7b2fff" stroke-width="2" opacity="0.4"/>
  <!-- Diamond shape (player icon) -->
  <polygon points="256,100 380,256 256,412 132,256" fill="none" stroke="#00f5ff" stroke-width="10" stroke-linejoin="round"/>
  <polygon points="256,156 330,256 256,356 182,256" fill="none" stroke="#7b2fff" stroke-width="6" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="#00f5ff"/>
  <!-- Corner triangles (geometric enemies) -->
  <polygon points="60,60 100,60 60,100" fill="#ff006e" opacity="0.7"/>
  <polygon points="452,60 412,60 452,100" fill="#ffbe0b" opacity="0.7"/>
  <polygon points="60,452 100,452 60,412" fill="#7b2fff" opacity="0.7"/>
  <polygon points="452,452 412,452 452,412" fill="#06d6a0" opacity="0.7"/>
  <!-- Text -->
  <text x="256" y="480" font-family="monospace" font-size="48" font-weight="900" fill="#00f5ff" text-anchor="middle" letter-spacing="8" opacity="0.9">GEO</text>
</svg>
