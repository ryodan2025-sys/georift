<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STELLAR STRIKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100dvh;overflow:hidden;font-family:'Orbitron',monospace;}
#gameWrapper{position:relative;width:min(100vw,calc(100dvh * 0.56));height:min(100dvh,calc(100vw * 1.78));max-width:420px;max-height:750px;}
canvas{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;}
.stat{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,12px);color:#00ffcc;text-shadow:0 0 8px #00ffcc;letter-spacing:1px;}
.stat span{color:#fff;font-size:1.3em;}
#livesBar{display:flex;gap:3px;justify-content:flex-end;}
.heart{font-size:clamp(11px,2.8vw,15px);filter:drop-shadow(0 0 4px #ff4466);}
#comboEl{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(14px,4vw,22px);color:#ffcc00;text-shadow:0 0 15px #ffcc00,0 0 30px #ff8800;pointer-events:none;z-index:12;opacity:0;transition:opacity 0.3s;letter-spacing:2px;}
#weaponEl{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,11px);color:#00ffcc;text-shadow:0 0 6px #00ffcc;pointer-events:none;z-index:12;letter-spacing:2px;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,0.9);z-index:20;gap:10px;backdrop-filter:blur(3px);overflow-y:auto;padding:20px 0;}
#overlay.hidden{display:none;}
.title-main{font-size:clamp(26px,8vw,50px);font-weight:900;color:#fff;letter-spacing:4px;text-align:center;text-shadow:0 0 20px #00ffcc,0 0 40px #0077ff;line-height:1;}
.title-sub{font-size:clamp(9px,2.5vw,13px);color:#00ffcc;letter-spacing:6px;font-family:'Share Tech Mono',monospace;text-shadow:0 0 8px #00ffcc;}
.score-display{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,3vw,15px);color:#ffcc00;text-shadow:0 0 10px #ffcc00;text-align:center;line-height:1.8;}
.btn{margin-top:6px;padding:12px 36px;border:2px solid #00ffcc;background:transparent;color:#00ffcc;font-family:'Orbitron',monospace;font-size:clamp(12px,3vw,15px);font-weight:700;letter-spacing:3px;cursor:pointer;text-transform:uppercase;position:relative;overflow:hidden;transition:all 0.2s;box-shadow:0 0 20px rgba(0,255,204,0.3);}
.btn:active{background:rgba(0,255,204,0.15);transform:scale(0.97);}
.hint{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2vw,10px);color:rgba(0,255,204,0.45);text-align:center;letter-spacing:1px;line-height:1.9;}
#scoreboardEl{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,11px);color:rgba(0,255,204,0.7);text-align:center;line-height:1.9;border-top:1px solid rgba(0,255,204,0.2);padding-top:8px;width:80%;}
#wave-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(18px,5.5vw,30px);font-weight:900;color:#fff;text-shadow:0 0 20px #ff6600,0 0 40px #ff3300;letter-spacing:3px;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.3s;text-align:center;}
#dailyEl{position:absolute;bottom:28px;left:8px;right:8px;font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.9vw,10px);color:rgba(255,200,0,0.7);pointer-events:none;z-index:12;line-height:1.6;}
#touchZone{position:absolute;inset:0;z-index:10;touch-action:none;}
#joystickBase{position:absolute;width:110px;height:110px;border-radius:50%;border:2px solid rgba(0,255,204,0.3);background:rgba(0,255,204,0.05);pointer-events:none;display:none;transform:translate(-50%,-50%);z-index:11;}
#joystickKnob{position:absolute;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ffcc,#007755);box-shadow:0 0 16px rgba(0,255,204,0.8);pointer-events:none;transform:translate(-50%,-50%);z-index:12;display:none;}
#slowmoFlash{position:absolute;inset:0;background:rgba(255,255,255,0);pointer-events:none;z-index:14;transition:background 0.1s;}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="stat">SKOR<br><span id="scoreEl">0</span></div>
    <div class="stat" style="text-align:center;">DALGA<br><span id="waveEl">1</span></div>
    <div style="text-align:right;">
      <div class="stat">CAN</div>
      <div id="livesBar"></div>
    </div>
  </div>
  <div id="comboEl"></div>
  <div id="weaponEl">● STANDART</div>
  <div id="wave-indicator"></div>
  <div id="dailyEl"></div>
  <div id="slowmoFlash"></div>
  <div id="overlay">
    <div class="title-sub">— UZAY MİSYONU —</div>
    <div class="title-main">STELLAR<br>STRIKE</div>
    <div class="score-display" id="overlayScore" style="display:none"></div>
    <div id="scoreboardEl" style="display:none"></div>
    <button class="btn" id="startBtn">BAŞLAT</button>
    <div class="hint">
      📱 Ekrana bas &amp; sürükle → hareket + ateş<br>
      Çift dokun → DASH kaçış hamlesi<br>
      🖥️ WASD / Ok + Boşluk + Shift(dash)
    </div>
  </div>
  <div id="joystickBase"></div>
  <div id="joystickKnob"></div>
  <div id="touchZone"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════
//  STELLAR STRIKE  –  Full featured version
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');
const jBase = document.getElementById('joystickBase');
const jKnob = document.getElementById('joystickKnob');
const touchZone = document.getElementById('touchZone');
const slowFlash = document.getElementById('slowmoFlash');

function resize(){ canvas.width=wrapper.offsetWidth; canvas.height=wrapper.offsetHeight; }
resize(); window.addEventListener('resize',resize);

// ── SCOREBOARD (localStorage) ─────────────────────────
function getScores(){ try{ return JSON.parse(localStorage.getItem('ss_scores')||'[]'); }catch(e){ return []; } }
function saveScore(s,w){
  let arr=getScores(); arr.push({s,w,d:new Date().toLocaleDateString('tr')});
  arr.sort((a,b)=>b.s-a.s); arr=arr.slice(0,5);
  try{ localStorage.setItem('ss_scores',JSON.stringify(arr)); }catch(e){}
}
function renderScoreboard(){
  const arr=getScores(); if(!arr.length) return '';
  return '— EN İYİ SKORLAR —\n'+arr.map((r,i)=>`${i+1}. ${r.s.toLocaleString()}  Dalga:${r.w}  ${r.d}`).join('\n');
}

// ── DAILY MISSIONS ────────────────────────────────────
const MISSIONS_DEF = [
  {id:'kill100', label:'100 düşman öldür', target:100, reward:'can'},
  {id:'wave5',   label:'5 dalga geç',       target:5,   reward:'rapid'},
  {id:'combo8',  label:'x8 combo yap',      target:1,   reward:'shield'},
  {id:'score5k', label:'5000 skor topla',   target:5000,reward:'can'},
];
function getTodayKey(){ return new Date().toDateString(); }
function getDailyProgress(){
  try{ const d=JSON.parse(localStorage.getItem('ss_daily')||'{}'); if(d.day!==getTodayKey()) return {day:getTodayKey(),prog:{}}; return d; }
  catch(e){ return {day:getTodayKey(),prog:{}}; }
}
function saveDailyProgress(dp){ try{ localStorage.setItem('ss_daily',JSON.stringify(dp)); }catch(e){} }
let dailyProgress = getDailyProgress();
let dailyRewardsGiven = {};

function checkDailyMission(id, value){
  const m = MISSIONS_DEF.find(x=>x.id===id); if(!m) return;
  if(dailyProgress.prog[id]>=(m.target)) return; // already done
  dailyProgress.prog[id] = (dailyProgress.prog[id]||0)+value;
  saveDailyProgress(dailyProgress);
  if(dailyProgress.prog[id]>=m.target && !dailyRewardsGiven[id]){
    dailyRewardsGiven[id]=true;
    grantDailyReward(m);
  }
  renderDailyUI();
}
function grantDailyReward(m){
  showWaveText('GÖREV TAMAM! +'+m.reward.toUpperCase());
  if(m.reward==='can'){ lives=Math.min(lives+1,5); renderLives(); }
  else if(m.reward==='rapid'){ rapidFire=6000; }
  else if(m.reward==='shield'){ shieldActive=true; setTimeout(()=>shieldActive=false,7000); }
}
function renderDailyUI(){
  const el=document.getElementById('dailyEl');
  el.innerHTML='GÜNLÜK GÖREVLER: '+MISSIONS_DEF.map(m=>{
    const cur=Math.min(dailyProgress.prog[m.id]||0, m.target);
    const done=cur>=m.target;
    return `<span style="color:${done?'#00ff88':'rgba(255,200,0,0.7)'}">${done?'✓':''} ${m.label} (${cur}/${m.target})</span>`;
  }).join(' · ');
}

// ── GAME STATE ────────────────────────────────────────
let state='menu';
let score=0,wave=1,lives=3;
let enemies=[],bullets=[],eBullets=[],particles=[],powerups=[],stars=[],asteroids=[],formations=[];
let player,lastTime=0,shootCooldown=0,enemySpawnTimer=0;
let bossActive=false,boss=null;
let waveEnemiesLeft=0,waveKilled=0;
let invincible=0,shieldActive=false,rapidFire=0;
let wavePhase='spawning',waveEnemyCount=0,waveSpawnInterval=2000,waveCooldown=0;
// Combo
let combo=0,comboTimer=0,comboDisplay=0;
// Weapon
let currentWeapon='standard'; // standard|spread|laser|missile
let weaponTimer=0;
// Dash
let dashCooldown=0,dashActive=0,dashVx=0,dashVy=0;
// Slow-mo
let slowmo=0;
// Screen shake (boss only, subtle)
let shakeAmt=0;
// Ship level (visual evolution)
let shipLevel=1; // 1,2,3
// Total kills for daily
let sessionKills=0;

// ── STARS ─────────────────────────────────────────────
function initStars(){
  stars=[];
  for(let i=0;i<140;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.3,speed:Math.random()*0.7+0.1,b:Math.random()});
}
function updateStars(dt){
  const s=dt/1000;
  for(const st of stars){
    st.y+=st.speed*dt*60/1000;
    if(st.y>canvas.height){st.y=0;st.x=Math.random()*canvas.width;}
    st.b=0.4+0.6*Math.abs(Math.sin(Date.now()/1500+st.x));
  }
}
function drawStars(){
  for(const s of stars){ctx.globalAlpha=s.b*0.8;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}

// ── PLAYER ────────────────────────────────────────────
function createPlayer(){
  return {x:canvas.width/2,y:canvas.height*0.8,w:36,h:44,speed:290,color:'#00ffcc'};
}

function getShipColor(){
  if(shipLevel>=3) return '#ff88ff';
  if(shipLevel>=2) return '#88ffff';
  return '#00ffcc';
}

function drawPlayer(p){
  if(invincible>0&&Math.floor(invincible/80)%2===0) return;
  const x=p.x,y=p.y,w=p.w,h=p.h;
  const col=getShipColor();

  // Engine flame (animated)
  const flameH=14+8*Math.sin(Date.now()/80);
  const flameGrad=ctx.createLinearGradient(x,y+h/2,x,y+h/2+flameH);
  flameGrad.addColorStop(0,'rgba(0,200,255,0.8)');
  flameGrad.addColorStop(0.5,'rgba(0,100,255,0.4)');
  flameGrad.addColorStop(1,'transparent');
  ctx.save(); ctx.fillStyle=flameGrad;
  ctx.beginPath(); ctx.ellipse(x,y+h/2+flameH/2,7,flameH/2,0,0,Math.PI*2); ctx.fill(); ctx.restore();

  ctx.save();
  ctx.fillStyle='#0a0a1a'; ctx.strokeStyle=col; ctx.lineWidth=2;
  ctx.shadowColor=col; ctx.shadowBlur=shipLevel>=2?18:12;

  // Hull
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);
  ctx.lineTo(x+w/2,y+h/2);
  ctx.lineTo(x+w/3,y+h/2-8);
  ctx.lineTo(x,y+h/4);
  ctx.lineTo(x-w/3,y+h/2-8);
  ctx.lineTo(x-w/2,y+h/2);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Level 2+: extra side cannons
  if(shipLevel>=2){
    ctx.fillStyle=col; ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.fillRect(x-w*0.7-4,y,8,16); ctx.strokeRect(x-w*0.7-4,y,8,16);
    ctx.fillRect(x+w*0.7-4,y,8,16); ctx.strokeRect(x+w*0.7-4,y,8,16);
  }
  // Level 3+: top fins
  if(shipLevel>=3){
    ctx.fillStyle='rgba(255,136,255,0.3)'; ctx.strokeStyle='#ff88ff';
    ctx.beginPath(); ctx.moveTo(x-w*0.55,y-h*0.1); ctx.lineTo(x-w*0.9,y-h*0.45); ctx.lineTo(x-w*0.35,y-h*0.15); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w*0.55,y-h*0.1); ctx.lineTo(x+w*0.9,y-h*0.45); ctx.lineTo(x+w*0.35,y-h*0.15); ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // Cockpit
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.ellipse(x,y-4,7,11,0,0,Math.PI*2); ctx.fill();

  // Wings
  ctx.fillStyle='rgba(0,255,204,0.12)';
  ctx.beginPath(); ctx.moveTo(x-w/3,y+4); ctx.lineTo(x-w*0.65,y+h/2); ctx.lineTo(x-w/4,y+h/2-8); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w/3,y+4); ctx.lineTo(x+w*0.65,y+h/2); ctx.lineTo(x+w/4,y+h/2-8); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();

  // Shield
  if(shieldActive){
    ctx.save(); ctx.strokeStyle='#00aaff'; ctx.lineWidth=3; ctx.shadowColor='#00aaff'; ctx.shadowBlur=20;
    ctx.globalAlpha=0.7+0.3*Math.sin(Date.now()/100);
    ctx.beginPath(); ctx.ellipse(x,y,w*0.95,h*0.95,0,0,Math.PI*2); ctx.stroke(); ctx.restore();
  }

  // Dash trail
  if(dashActive>0){
    ctx.save(); ctx.globalAlpha=dashActive/200*0.4; ctx.fillStyle=col;
    ctx.beginPath(); ctx.ellipse(x-dashVx*15,y-dashVy*15,w*0.7,h*0.7,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

// ── WEAPON SYSTEM ─────────────────────────────────────
const WEAPONS=['standard','spread','laser','missile'];
const WEAPON_NAMES={'standard':'● STANDART','spread':'⟠ YAYILMA','laser':'━ LAZER','missile':'⬡ FÜZE'};
const WEAPON_COLORS={'standard':'#00ffcc','spread':'#ffcc00','laser':'#ff4466','missile':'#aa44ff'};

function fireWeapon(){
  const c=WEAPON_COLORS[currentWeapon];
  if(currentWeapon==='standard'){
    shootBullet(player.x,player.y-player.h/2,-640,c,4,16,1);
    if(rapidFire>0||shipLevel>=2){
      shootBullet(player.x-14,player.y-player.h/4,-600,'#00ccff',3,12,1);
      shootBullet(player.x+14,player.y-player.h/4,-600,'#00ccff',3,12,1);
    }
  } else if(currentWeapon==='spread'){
    for(let a=-2;a<=2;a++) shootBullet(player.x+a*8,player.y-player.h/2,-580+Math.abs(a)*20,c,4,13,1,a*60);
  } else if(currentWeapon==='laser'){
    // laser: fast thin long
    shootBullet(player.x,player.y-player.h/2,-900,'#ff4466',3,28,2);
  } else if(currentWeapon==='missile'){
    bullets.push({x:player.x-10,y:player.y-player.h/2,vy:-400,vx:-15,w:5,h:18,color:c,dmg:3,homing:true});
    bullets.push({x:player.x+10,y:player.y-player.h/2,vy:-400,vx:15,w:5,h:18,color:c,dmg:3,homing:true});
  }
}

function shootBullet(x,y,vy,color,w=4,h=14,dmg=1,vx=0){
  bullets.push({x,y,vy,vx,w,h,color,dmg,homing:false});
}

function drawBullet(b){
  ctx.save();
  ctx.shadowColor=b.color; ctx.shadowBlur=12;
  const g=ctx.createLinearGradient(b.x,b.y-b.h/2,b.x,b.y+b.h/2);
  g.addColorStop(0,b.color); g.addColorStop(1,'transparent');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.roundRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h,2); ctx.fill();
  ctx.restore();
}

// ── ENEMIES ───────────────────────────────────────────
const ENEMY_TYPES=[
  {w:38,h:22,hp:1,score:100,color:'#ff4466',speed:80,shape:'ufo',shootRate:0.003,bulletSpeed:160},
  {w:28,h:32,hp:2,score:200,color:'#ff9900',speed:130,shape:'dart',shootRate:0.002,bulletSpeed:180,zigzag:true},
  {w:48,h:40,hp:4,score:400,color:'#aa44ff',speed:55,shape:'tank',shootRate:0.005,bulletSpeed:140},
];
// Elite types (mini-boss)
const ELITE_TYPES=[
  {id:'shield',   color:'#00ccff', label:'KALKAN',   hp:8,  w:46,h:38, ability:'shield'},
  {id:'splitter', color:'#ff6600', label:'BÖLÜNÜR',  hp:6,  w:40,h:34, ability:'split'},
  {id:'reflector',color:'#ffff00', label:'YANSITIR', hp:5,  w:42,h:36, ability:'reflect'},
];

function spawnEnemy(){
  const typePool=ENEMY_TYPES.slice(0,Math.min(ENEMY_TYPES.length,1+Math.floor(wave/2)));
  const t=typePool[Math.floor(Math.random()*typePool.length)];
  const x=t.w+Math.random()*(canvas.width-t.w*2);
  enemies.push({...t,x,y:-t.h,hp:t.hp+Math.floor(wave/3),maxHp:t.hp+Math.floor(wave/3),
    dy:t.speed+wave*5,dx:t.zigzag?(Math.random()>0.5?1:-1)*60:0,zigPhase:Math.random()*Math.PI*2,hitFlash:0,isElite:false});
}

function spawnElite(){
  const t=ELITE_TYPES[Math.floor(Math.random()*ELITE_TYPES.length)];
  const x=t.w+Math.random()*(canvas.width-t.w*2);
  const hp=t.hp+wave*2;
  enemies.push({...t,x,y:-t.h,hp,maxHp:hp,dy:70+wave*4,dx:0,zigPhase:0,hitFlash:0,
    isElite:true,shootRate:0.006,bulletSpeed:160,shape:'elite',shieldHp:t.ability==='shield'?5:0,
    score:800+wave*100});
}

function spawnFormation(){
  // V or arrow formation
  const shapes=['v','arrow','line'];
  const shape=shapes[Math.floor(Math.random()*shapes.length)];
  const cx=60+Math.random()*(canvas.width-120);
  const t=ENEMY_TYPES[0]; // basic ufo
  const positions=[];
  if(shape==='v'){
    for(let i=-2;i<=2;i++) positions.push({x:cx+i*44,y:-60-Math.abs(i)*36});
  } else if(shape==='arrow'){
    positions.push({x:cx,y:-40});
    for(let i=1;i<=2;i++){positions.push({x:cx-i*38,y:-40+i*30});positions.push({x:cx+i*38,y:-40+i*30});}
  } else {
    for(let i=-2;i<=2;i++) positions.push({x:cx+i*44,y:-50});
  }
  for(const pos of positions){
    enemies.push({...t,x:pos.x,y:pos.y,hp:1+Math.floor(wave/3),maxHp:1+Math.floor(wave/3),
      dy:65+wave*4,dx:0,zigPhase:0,hitFlash:0,isElite:false,isFormation:true,score:150});
  }
}

function drawEnemy(e){
  ctx.save();
  if(e.hitFlash>0) ctx.filter='brightness(3)';
  ctx.shadowColor=e.color; ctx.shadowBlur=e.isElite?22:14;

  if(e.shape==='ufo'||e.shape==='elite'){
    const col=e.hitFlash>0?'#fff':e.color;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.ellipse(e.x,e.y,e.w/2,e.h/2.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.ellipse(e.x,e.y-e.h/5,e.w/3,e.h/2.8,0,Math.PI,Math.PI*2); ctx.fill();
    for(let i=-1;i<=1;i++){
      ctx.fillStyle=`hsl(${(Date.now()/5+i*120)%360},100%,70%)`;
      ctx.beginPath(); ctx.arc(e.x+i*12,e.y+2,3,0,Math.PI*2); ctx.fill();
    }
    if(e.isElite){
      ctx.strokeStyle=e.color; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.ellipse(e.x,e.y,e.w/2+4,e.h/2.5+4,0,0,Math.PI*2); ctx.stroke();
      // label
      ctx.filter='none'; ctx.font='bold 9px Orbitron,monospace'; ctx.fillStyle='#fff';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e.label||'',e.x,e.y);
    }
    // Shield bubble
    if(e.ability==='shield'&&e.shieldHp>0){
      ctx.filter='none'; ctx.strokeStyle='#00ccff'; ctx.lineWidth=2; ctx.globalAlpha=0.6;
      ctx.beginPath(); ctx.ellipse(e.x,e.y,e.w*0.7,e.h*0.7,0,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    }
  } else if(e.shape==='dart'){
    ctx.fillStyle=e.hitFlash>0?'#fff':'#0a0a1a'; ctx.strokeStyle=e.color; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(e.x,e.y+e.h/2); ctx.lineTo(e.x-e.w/2,e.y-e.h/2);
    ctx.lineTo(e.x,e.y-e.h/5); ctx.lineTo(e.x+e.w/2,e.y-e.h/2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if(e.shape==='tank'){
    ctx.fillStyle=e.hitFlash>0?'#fff':'#0a0a1a'; ctx.strokeStyle=e.color; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.roundRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle=e.color; ctx.fillRect(e.x-4,e.y+4,8,18);
  }

  // HP bar
  if(e.hp<e.maxHp||e.isElite){
    ctx.filter='none';
    const bw=e.w*0.9;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-bw/2,e.y-e.h/2-10,bw,5);
    ctx.fillStyle=e.color; ctx.fillRect(e.x-bw/2,e.y-e.h/2-10,bw*(e.hp/e.maxHp),5);
  }
  ctx.restore();
}

// ── ASTEROIDS ─────────────────────────────────────────
function spawnAsteroid(){
  const r=18+Math.random()*22;
  asteroids.push({x:r+Math.random()*(canvas.width-r*2),y:-r*2,r,hp:2,maxHp:2,
    vy:80+Math.random()*60,vx:(Math.random()-0.5)*40,rot:0,rotSpeed:(Math.random()-0.5)*2,
    points:Array.from({length:8},(_,i)=>{const a=i/8*Math.PI*2;return{a,r:r*(0.7+Math.random()*0.5);}})
  });
}
let asteroidTimer=0;

function drawAsteroid(a){
  ctx.save();
  ctx.translate(a.x,a.y); ctx.rotate(a.rot);
  ctx.fillStyle='#554433'; ctx.strokeStyle='#aa8855'; ctx.lineWidth=2;
  ctx.shadowColor='#aa8855'; ctx.shadowBlur=8;
  ctx.beginPath();
  a.points.forEach((p,i)=>{ const x=Math.cos(p.a)*p.r,y=Math.sin(p.a)*p.r; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ── BOSS ──────────────────────────────────────────────
function spawnBoss(){
  bossActive=true;
  boss={x:canvas.width/2,y:-90,w:110,h:76,hp:25+wave*10,maxHp:25+wave*10,
    speed:65,dx:1,shootTimer:0,hitFlash:0,color:'#cc00ff',phase:1};
  showWaveText('⚠ BOSS ⚠');
}

function drawBoss(b){
  ctx.save();
  if(b.hitFlash>0) ctx.filter='brightness(3)';
  ctx.shadowColor=b.color; ctx.shadowBlur=35;
  ctx.fillStyle='#0a0a1a'; ctx.strokeStyle=b.color; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(b.x,b.y-b.h/2); ctx.lineTo(b.x+b.w/2,b.y); ctx.lineTo(b.x+b.w*0.75,b.y+b.h/2);
  ctx.lineTo(b.x-b.w*0.75,b.y+b.h/2); ctx.lineTo(b.x-b.w/2,b.y); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Phase 2: red aura
  if(b.hp<b.maxHp*0.5){
    ctx.strokeStyle='#ff0044'; ctx.lineWidth=2; ctx.globalAlpha=0.4+0.3*Math.sin(Date.now()/150);
    ctx.beginPath(); ctx.ellipse(b.x,b.y,b.w*0.7,b.h*0.7,0,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
  }
  ctx.fillStyle=b.color; ctx.beginPath(); ctx.ellipse(b.x,b.y,26,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath();
  ctx.arc(b.x+Math.sin(Date.now()/300)*5,b.y+Math.cos(Date.now()/400)*4,4.5,0,Math.PI*2); ctx.fill();
  const bw=b.w*1.3;
  ctx.filter='none'; ctx.shadowBlur=0;
  ctx.fillStyle='rgba(200,0,255,0.2)'; ctx.fillRect(b.x-bw/2,b.y-b.h/2-16,bw,8);
  const hpFrac=b.hp/b.maxHp;
  ctx.fillStyle=hpFrac>0.5?b.color:'#ff0044'; ctx.fillRect(b.x-bw/2,b.y-b.h/2-16,bw*hpFrac,8);
  ctx.strokeStyle='rgba(200,0,255,0.4)'; ctx.lineWidth=1; ctx.strokeRect(b.x-bw/2,b.y-b.h/2-16,bw,8);
  ctx.restore();
}

// ── PARTICLES ─────────────────────────────────────────
function explode(x,y,color,count=20){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2,speed=Math.random()*220+60;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,decay:Math.random()*1.5+0.8,r:Math.random()*4+1,color});
  }
}

// ── POWERUPS ──────────────────────────────────────────
const POWERUP_TYPES=[
  {type:'shield', color:'#00aaff',label:'🛡'},
  {type:'rapid',  color:'#ffcc00',label:'⚡'},
  {type:'life',   color:'#ff4466',label:'❤'},
  {type:'weapon', color:'#aa44ff',label:'🔫'},
];

function spawnPowerup(x,y){
  if(Math.random()>0.28) return;
  const t=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];

function applyPowerup(p){
  explode(p.x,p.y,p.color,15);
  if(p.type==='shield'){shieldActive=true;setTimeout(()=>shieldActive=false,6000);}
  else if(p.type==='rapid'){rapidFire=5000;}
  else if(p.type==='life'){lives=Math.min(lives+1,5);renderLives();}
  else if(p.type==='weapon'){

  }

// ── COLLISION ─────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax-aw/2<bx+bw/2&&ax+aw/2>bx-bw/2&&ay-ah/2<by+bh/2&&ay+ah/2>by-bh/2;
}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  return Math.abs(cx-rx)<rw/2+cr&&Math.abs(cy-ry)<rh/2+cr;
}

// ── INPUT ─────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space') e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
// PC dash: Shift
window.addEventListener('keydown',e=>{if(e.code==='ShiftLeft'||e.code==='ShiftRight') tryDash();});

// ── TOUCH JOYSTICK ────────────────────────────────────
const joystick={active:false,id:null,baseX:0,baseY:0,dx:0,dy:0,moving:false};
const JRADIUS=58;
let lastTapTime=0;

touchZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state!=='playing') return;
  // Double tap = dash
  const now=Date.now();
  if(now-lastTapTime<300){ tryDash(); }
  lastTapTime=now;
  if(joystick.active) return;
  const t=e.changedTouches[0];
  joystick.active=true; joystick.id=t.identifier;
  joystick.baseX=t.clientX; joystick.baseY=t.clientY;
  joystick.dx=0; joystick.dy=0; joystick.moving=false;
  const r=wrapper.getBoundingClientRect();
  const cx=t.clientX-r.left, cy=t.clientY-r.top;
  jBase.style.left=cx+'px'; jBase.style.top=cy+'px';
  jKnob.style.left=cx+'px'; jKnob.style.top=cy+'px';
  jBase.style.display='block'; jKnob.style.display='block';
},{passive:false});

touchZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joystick.id) continue;
    const dx=t.clientX-joystick.baseX, dy=t.clientY-joystick.baseY;
    const dist=Math.hypot(dx,dy), clamped=Math.min(dist,JRADIUS);
    const nx=dist>0?dx/dist:0, ny=dist>0?dy/dist:0;
    joystick.dx=nx*(clamped/JRADIUS); joystick.dy=ny*(clamped/JRADIUS);
    joystick.moving=dist>8;
    const r=wrapper.getBoundingClientRect();
    jKnob.style.left=(joystick.baseX-r.left+nx*clamped)+'px';
    jKnob.style.top=(joystick.baseY-r.top+ny*clamped)+'px';
  }
},{passive:false});

['touchend','touchcancel'].forEach(ev=>touchZone.addEventListener(ev,e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joystick.id) continue;
    joystick.active=false; joystick.dx=0; joystick.dy=0; joystick.moving=false;
    jBase.style.display='none'; jKnob.style.display='none';
  }
},{passive:false}));

// ── DASH ──────────────────────────────────────────────
function tryDash(){
  if(dashCooldown>0||dashActive>0) return;
  let dx=joystick.dx||0, dy=joystick.dy||0;
  if(keys['ArrowLeft']||keys['KeyA']) dx=-1;
  if(keys['ArrowRight']||keys['KeyD']) dx=1;
  if(keys['ArrowUp']||keys['KeyW']) dy=-1;
  if(keys['ArrowDown']||keys['KeyS']) dy=1;
  if(dx===0&&dy===0){ dy=-1; } // default: dash up
  const len=Math.hypot(dx,dy);
  dashVx=dx/len; dashVy=dy/len;
  dashActive=200; dashCooldown=1500;
  invincible=Math.max(invincible,220);
  explode(player.x,player.y,'#00ffcc',8);
}

// ── START ─────────────────────────────────────────────
function startGame(){
  score=0;wave=1;lives=3;sessionKills=0;
  enemies=[];bullets=[];eBullets=[];particles=[];powerups=[];asteroids=[];
  player=createPlayer(); shootCooldown=0;invincible=0;shieldActive=false;rapidFire=0;
  bossActive=false;boss=null;wavePhase='spawning';
  combo=0;comboTimer=0;currentWeapon='standard';weaponTimer=0;
  dashCooldown=0;dashActive=0;slowmo=0;shakeAmt=0;shipLevel=1;
  dailyRewardsGiven={};
  state='playing';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('scoreEl').textContent='0';
  document.getElementById('waveEl').textContent='1';
  document.getElementById('weaponEl').textContent=WEAPON_NAMES.standard;
  document.getElementById('weaponEl').style.color=WEAPON_COLORS.standard;
  renderLives(); initStars(); startWave(); renderDailyUI();
  lastTime=performance.now();
  requestAnimationFrame(loop);
}
document.getElementById('startBtn').addEventListener('click',startGame);

// ── MAIN LOOP ─────────────────────────────────────────
function loop(ts){
  if(state!=='playing') return;
  const rawDt=Math.min(ts-lastTime,50); lastTime=ts;
  const dt=slowmo>0?rawDt*0.35:rawDt;
  if(slowmo>0) slowmo-=rawDt;
  update(dt,rawDt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt,rawDt){
  const ms=dt, s=dt/1000;

  updateStars(dt);
  if(shakeAmt>0) shakeAmt*=0.82;

  // ── Weapon timer ─────────────────────────────────────
  if(weaponTimer>0){ weaponTimer-=rawDt; if(weaponTimer<=0){ currentWeapon='standard'; document.getElementById('weaponEl').textContent=WEAPON_NAMES.standard; document.getElementById('weaponEl').style.color=WEAPON_COLORS.standard; } }
  if(rapidFire>0) rapidFire-=rawDt;

  // ── Combo timer ───────────────────────────────────────
  if(comboTimer>0){ comboTimer-=rawDt; if(comboTimer<=0) resetCombo(); }

  // ── Dash ─────────────────────────────────────────────
  if(dashCooldown>0) dashCooldown-=rawDt;
  if(dashActive>0){
    dashActive-=rawDt;
    player.x+=dashVx*700*s;
    player.y+=dashVy*700*s;
  }

  // ── Player move ───────────────────────────────────────
  let mx=0,my=0;
  if(keys['ArrowLeft']||keys['KeyA']) mx-=1;
  if(keys['ArrowRight']||keys['KeyD']) mx+=1;
  if(keys['ArrowUp']||keys['KeyW']) my-=1;
  if(keys['ArrowDown']||keys['KeyS']) my+=1;
  if(joystick.active){mx+=joystick.dx;my+=joystick.dy;}
  const len=Math.hypot(mx,my); if(len>1){mx/=len;my/=len;}
  if(dashActive<=0){player.x+=mx*player.speed*s; player.y+=my*player.speed*s;}
  player.x=Math.max(player.w/2,Math.min(canvas.width-player.w/2,player.x));
  player.y=Math.max(player.h/2,Math.min(canvas.height-player.h/2,player.y));

  // ── Shoot ─────────────────────────────────────────────
  const isMoving=joystick.active&&joystick.moving;
  const isKeyFire=keys['Space']||keys['KeyZ'];
  const fireCd=currentWeapon==='laser'?80:rapidFire>0?90:220;
  if(shootCooldown>0) shootCooldown-=rawDt;
  if((isMoving||isKeyFire)&&shootCooldown<=0){ fireWeapon(); shootCooldown=fireCd; }
  if(invincible>0) invincible-=rawDt;

  // ── Bullets (homing missiles) ──────────────────────────
  bullets=bullets.filter(b=>{
    if(b.homing&&enemies.length>0){
      let closest=null,cd=999999;
      for(const e of enemies){ const d=Math.hypot(e.x-b.x,e.y-b.y); if(d<cd){cd=d;closest=e;} }
      if(closest){ const ang=Math.atan2(closest.y-b.y,closest.x-b.x); b.vx+=(Math.cos(ang)*300-b.vx)*s*3; b.vy+=(Math.sin(ang)*-400-b.vy)*s*1; }
    }
    b.x+=(b.vx||0)*s; b.y+=b.vy*s; return b.y>-30&&b.y<canvas.height+10;
  });

  // ── Enemy bullets ─────────────────────────────────────
  eBullets=eBullets.filter(b=>{
    b.x+=(b.vx||0)*s; b.y+=b.vy*s;
    if(b.y>canvas.height+20) return false;
    // Reflect off player shield
    if(invincible<=0&&shieldActive&&circleRect(b.x,b.y,6,player.x,player.y,player.w*1.9,player.h*1.9)){
      b.vy=-Math.abs(b.vy); b.color='#00aaff'; explode(b.x,b.y,'#00aaff',4); return true;
    }
    if(invincible<=0&&!shieldActive&&rectsOverlap(player.x,player.y,player.w,player.h,b.x,b.y,6,14)){hitPlayer();return false;}
    return true;
  });

  // ── Asteroids ─────────────────────────────────────────
  asteroidTimer-=rawDt;
  if(asteroidTimer<=0){ spawnAsteroid(); asteroidTimer=Math.max(3000,8000-wave*300); }
  asteroids=asteroids.filter(a=>{
    a.x+=a.vx*s; a.y+=a.vy*s; a.rot+=a.rotSpeed*s;
    if(a.y>canvas.height+60) return false;
    // Bullet hits asteroid
    bullets=bullets.filter(b=>{
      if(circleRect(b.x,b.y,a.r,a.x,a.y,a.r*2,a.r*2)){
        a.hp-=b.dmg;
        if(a.hp<=0){
          explode(a.x,a.y,'#aa8855',15); score+=200+wave*30;
          // Split into 2 smaller
          if(a.r>14){ for(let i=0;i<2;i++) asteroids.push({x:a.x+(i?1:-1)*20,y:a.y,r:a.r*0.55,hp:1,maxHp:1,vy:a.vy+30,vx:(Math.random()-0.5)*80,rot:0,rotSpeed:(Math.random()-0.5)*3,points:Array.from({length:7},(_,j)=>{const ang=j/7*Math.PI*2;return{a:ang,r:(a.r*0.55)*(0.7+Math.random()*0.5)};})});}
          return false;
        }
        return false;
      }
      return true;
    });
    // Asteroid hits player
    if(a.hp>0&&invincible<=0&&!shieldActive&&circleRect(a.x,a.y,a.r,player.x,player.y,player.w,player.h)){hitPlayer();explode(a.x,a.y,'#aa8855',12);a.hp=0;return false;}
    return a.hp>0;
  });

  // ── Wave state machine ─────────────────────────────────
  if(!bossActive){
    if(wavePhase==='spawning'){
      if(waveEnemiesLeft>0){
        enemySpawnTimer-=rawDt;
        if(enemySpawnTimer<=0){
          // Occasionally spawn elite or formation instead
          const r=Math.random();
          if(r<0.06&&wave>=2){ spawnElite(); waveEnemiesLeft=Math.max(0,waveEnemiesLeft-3); }
          else if(r<0.15&&wave>=2){ spawnFormation(); waveEnemiesLeft=Math.max(0,waveEnemiesLeft-5); }
          else spawnEnemy();
          waveEnemiesLeft--; enemySpawnTimer=waveSpawnInterval;
        }
      } else { wavePhase='waiting'; }
    } else if(wavePhase==='waiting'){
      if(enemies.length===0){
        if(wave%3===0){spawnBoss();wavePhase='boss';}
        else{wave++;document.getElementById('waveEl').textContent=wave;waveCooldown=1800;wavePhase='cooldown';checkDailyMission('wave5',1);}
      }
    } else if(wavePhase==='cooldown'){
      waveCooldown-=rawDt; if(waveCooldown<=0) startWave();
    }
  }

  // ── Boss ──────────────────────────────────────────────
  if(bossActive&&boss){
    if(boss.y<110) boss.y+=boss.speed*s;
    boss.x+=boss.dx*(boss.speed*0.85)*s;
    if(boss.x>canvas.width-boss.w/2||boss.x<boss.w/2) boss.dx*=-1;
    boss.shootTimer-=ms;
    if(boss.hitFlash>0) boss.hitFlash-=rawDt;
    if(boss.shootTimer<=0){
      boss.shootTimer=Math.max(320,850-wave*28);
      const phase2=boss.hp<boss.maxHp*0.5;
      for(let a=-1;a<=1;a++) eBullets.push({x:boss.x+a*25,y:boss.y+boss.h/2,vx:a*90,vy:230,color:'#cc00ff'});
      if(wave>=2||phase2) eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:0,vy:310,color:'#ff00cc'});
      if(phase2){ // spiral in phase 2
        for(let i=0;i<4;i++){const a2=i/4*Math.PI*2;eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a2)*160,vy:Math.sin(a2)*160+100,color:'#ff0044'});}
      }
    }
    bullets=bullets.filter(b=>{
      if(rectsOverlap(boss.x,boss.y,boss.w,boss.h,b.x,b.y,b.w,b.h)){
        boss.hp-=b.dmg; boss.hitFlash=80; explode(b.x,b.y,'#cc00ff',5);
        if(boss.hp<=0){
          triggerShake(5); triggerSlowmo(600);
          explode(boss.x,boss.y,'#cc00ff',60); explode(boss.x,boss.y,'#ffffff',30);
          score+=Math.floor((3000+wave*600)*comboMultiplier()); spawnPowerup(boss.x,boss.y); spawnPowerup(boss.x+40,boss.y);
          bossActive=false;boss=null;
          wave++;document.getElementById('waveEl').textContent=wave;
          waveCooldown=2200;wavePhase='cooldown';checkDailyMission('wave5',1);
        }
        return false;
      }
      return true;
    });
    if(invincible<=0&&!shieldActive&&rectsOverlap(player.x,player.y,player.w,player.h,boss.x,boss.y,boss.w,boss.h)) hitPlayer();
  }

  // ── Enemies ───────────────────────────────────────────
  enemies=enemies.filter(e=>{
    e.y+=e.dy*s;
    if(e.zigzag) e.x+=e.dx*Math.sin(Date.now()/400+e.zigPhase)*1.2;
    if(e.hitFlash>0) e.hitFlash-=rawDt;
    e.x=Math.max(e.w/2,Math.min(canvas.width-e.w/2,e.x));
    if(Math.random()<e.shootRate*ms){
      const angle=Math.atan2(player.y-e.y,player.x-e.x);
      eBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(angle)*e.bulletSpeed*0.4,vy:e.bulletSpeed,color:e.color});
    }
    let alive=true;
    bullets=bullets.filter(b=>{
      if(!alive) return true;
      if(!rectsOverlap(e.x,e.y,e.w,e.h,b.x,b.y,b.w,b.h)) return true;
      // Reflector: bounce bullet back
      if(e.ability==='reflect'&&e.hp>1){ b.vy=Math.abs(b.vy)*0.8; b.color='#ffff00'; e.hitFlash=80; explode(b.x,b.y,'#ffff00',4); return true; }
      // Shield absorbs
      if(e.ability==='shield'&&e.shieldHp>0){ e.shieldHp-=b.dmg; e.hitFlash=80; explode(b.x,b.y,'#00ccff',4); return false; }
      e.hp-=b.dmg; e.hitFlash=80; explode(b.x,b.y,e.color,5);
      if(e.hp<=0){
        explode(e.x,e.y,e.color,22);
        const pts=Math.floor((e.score+wave*20)*comboMultiplier());
        score+=pts; sessionKills++; waveKilled++;
        checkDailyMission('kill100',1); checkDailyMission('score5k',pts);
        addCombo(); spawnPowerup(e.x,e.y);
        // Splitter: splits into 2 smalls
        if(e.ability==='split'){
          for(let si=0;si<2;si++){
            const nt=ENEMY_TYPES[0];
            enemies.push({...nt,x:e.x+(si?30:-30),y:e.y,hp:1,maxHp:1,dy:e.dy+20,dx:0,zigPhase:0,hitFlash:0,isElite:false,score:50});
          }
        }
        alive=false;
      }
      return false;
    });
    if(!alive) return false;
    if(invincible<=0&&!shieldActive&&rectsOverlap(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      hitPlayer(); explode(e.x,e.y,e.color,15); resetCombo(); return false;
    }
    return e.y<canvas.height+60;
  });

  // ── Powerups ──────────────────────────────────────────
  powerups=powerups.filter(p=>{
    p.y+=p.vy*s;
    if(rectsOverlap(player.x,player.y,player.w*1.4,player.h*1.4,p.x,p.y,p.r*2,p.r*2)){applyPowerup(p);return false;}
    return p.y<canvas.height+30;
  });

  // ── Particles ─────────────────────────────────────────
  particles=particles.filter(p=>{p.x+=p.vx*s;p.y+=p.vy*s;p.vx*=0.95;p.vy*=0.95;p.life-=p.decay*s;return p.life>0;});

  // ── Score & ship level ────────────────────────────────
  document.getElementById('scoreEl').textContent=score.toLocaleString();
  checkDailyMission('score5k',0); // just re-render
  updateShipLevel();
}

function hitPlayer(){
  if(invincible>0) return;
  lives--;renderLives();invincible=1900;resetCombo();
  explode(player.x,player.y,'#ff4466',16); triggerShake(4);
  if(lives<=0) gameOver();
}

function gameOver(){
  saveScore(score,wave);
  state='menu';
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlayScore').style.display='block';
  document.getElementById('overlayScore').textContent=`SKOR: ${score.toLocaleString()}\nDALGA: ${wave}  |  KİLL: ${sessionKills}`;
  const sb=document.getElementById('scoreboardEl');
  sb.style.display='block'; sb.textContent=renderScoreboard();
  document.getElementById('startBtn').textContent='YENİDEN OYNA';
  jBase.style.display='none';jKnob.style.display='none';
}

// ── DRAW ──────────────────────────────────────────────
function draw(){
  // Screen shake
  ctx.save();
  if(shakeAmt>0.5){ctx.translate((Math.random()-0.5)*shakeAmt*2,(Math.random()-0.5)*shakeAmt*2);}

  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,'#000008');bg.addColorStop(1,'#000020');
  ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);

  drawStars();

  // Nebula
  ctx.save();ctx.globalAlpha=0.055;
  const neb=ctx.createRadialGradient(canvas.width*0.7,canvas.height*0.3,10,canvas.width*0.7,canvas.height*0.3,200);
  neb.addColorStop(0,'#aa00ff');neb.addColorStop(1,'transparent');
  ctx.fillStyle=neb;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();

  // Particles
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=7;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // Asteroids
  for(const a of asteroids) drawAsteroid(a);

  // Powerups
  for(const p of powerups){
    ctx.save();ctx.shadowColor=p.color;ctx.shadowBlur=16;ctx.strokeStyle=p.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.18+0.1*Math.sin(Date.now()/200);ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.font=`${p.r*1.3}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.label,p.x,p.y);ctx.restore();
  }

  for(const e of enemies) drawEnemy(e);
  if(bossActive&&boss) drawBoss(boss);

  for(const b of eBullets){
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  for(const b of bullets) drawBullet(b);

  if(state==='playing') drawPlayer(player);

  // Scanlines
  ctx.save();ctx.globalAlpha=0.022;
  for(let y=0;y<canvas.height;y+=3){ctx.fillStyle='#000';ctx.fillRect(0,y,canvas.width,1);}
  ctx.restore();

  ctx.restore(); // end shake
}

// ── START MENU LOOP ───────────────────────────────────
initStars();
(function menuLoop(){
  if(state!=='menu') return;
  updateStars(16);draw();requestAnimationFrame(menuLoop);
})();
</script>
