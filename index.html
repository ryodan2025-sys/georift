<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STELLAR STRIKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
  }

  #gameWrapper {
    position: relative;
    width: min(100vw, calc(100dvh * 0.56));
    height: min(100dvh, calc(100vw * 1.78));
    max-width: 420px;
    max-height: 750px;
  }

  canvas { display: block; width: 100%; height: 100%; }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }

  .stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 2.5vw, 14px);
    color: #00ffcc;
    text-shadow: 0 0 8px #00ffcc;
    letter-spacing: 1px;
  }
  .stat span { color: #fff; font-size: 1.2em; }

  #livesBar { display: flex; gap: 4px; }
  .heart { font-size: clamp(12px, 3vw, 16px); filter: drop-shadow(0 0 4px #ff4466); }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,10,0.88);
    z-index: 20;
    gap: 16px;
    backdrop-filter: blur(2px);
  }
  #overlay.hidden { display: none; }

  .title-main {
    font-size: clamp(28px, 9vw, 52px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    text-align: center;
    text-shadow: 0 0 20px #00ffcc, 0 0 40px #0077ff;
    line-height: 1;
  }
  .title-sub {
    font-size: clamp(10px, 3vw, 14px);
    color: #00ffcc;
    letter-spacing: 6px;
    font-family: 'Share Tech Mono', monospace;
    text-shadow: 0 0 8px #00ffcc;
  }
  .score-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px, 3.5vw, 18px);
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00;
    text-align: center;
  }
  .btn {
    margin-top: 10px;
    padding: 14px 40px;
    border: 2px solid #00ffcc;
    background: transparent;
    color: #00ffcc;
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,255,204,0.3), inset 0 0 20px rgba(0,255,204,0.05);
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,204,0.2), transparent);
    transition: 0.4s;
  }
  .btn:hover::before, .btn:active::before { left: 100%; }
  .btn:active { background: rgba(0,255,204,0.15); transform: scale(0.97); }

  .hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 2.2vw, 11px);
    color: rgba(0,255,204,0.5);
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  #wave-indicator {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: clamp(20px, 6vw, 32px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }

  /* Touch zone - full screen */
  #touchZone {
    position: absolute;
    inset: 0;
    z-index: 10;
    touch-action: none;
  }

  /* Floating joystick base */
  #joystickBase {
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,204,0.3);
    background: rgba(0,255,204,0.05);
    pointer-events: none;
    display: none;
    transform: translate(-50%, -50%);
    z-index: 11;
    box-shadow: 0 0 20px rgba(0,255,204,0.1);
  }

  /* Joystick knob */
  #joystickKnob {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #00ffcc, #007755);
    box-shadow: 0 0 16px rgba(0,255,204,0.8);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 12;
    display: none;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <div id="ui">
    <div class="stat">SKOR<br><span id="scoreEl">0</span></div>
    <div class="stat" style="text-align:center;">DALGA<br><span id="waveEl">1</span></div>
    <div>
      <div class="stat" style="text-align:right;">CAN</div>
      <div id="livesBar"></div>
    </div>
  </div>

  <div id="wave-indicator"></div>

  <div id="overlay">
    <div class="title-sub">— UZAY MİSYONU —</div>
    <div class="title-main">STELLAR<br>STRIKE</div>
    <div class="score-display" id="overlayScore" style="display:none"></div>
    <button class="btn" id="startBtn">BAŞLAT</button>
    <div class="hint">
      📱 Ekrana bas, sürükleyerek uç<br>
      Hareket edince otomatik ateş açılır<br>
      🖥️ PC: WASD / Ok tuşları + Boşluk
    </div>
  </div>

  <!-- Floating joystick elements -->
  <div id="joystickBase"></div>
  <div id="joystickKnob"></div>

  <!-- Full-screen touch zone -->
  <div id="touchZone"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');
const jBase = document.getElementById('joystickBase');
const jKnob = document.getElementById('joystickKnob');
const touchZone = document.getElementById('touchZone');

// ─── Canvas sizing ──────────────────────────────────────────
function resize() {
  canvas.width = wrapper.offsetWidth;
  canvas.height = wrapper.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Game state ────────────────────────────────────────────
let state = 'menu';
let score = 0, wave = 1, lives = 3;
let enemies = [], bullets = [], eBullets = [], particles = [], powerups = [], stars = [];
let player, lastTime = 0, shootCooldown = 0, enemySpawnTimer = 0;
let bossActive = false, boss = null;
let waveEnemiesLeft = 0, waveKilled = 0;
let invincible = 0, shieldActive = false;
let rapidFire = 0;
let wavePhase = 'spawning';
let waveEnemyCount = 0, waveSpawnInterval = 2000, waveCooldown = 0;

// ─── Stars ─────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.6 + 0.1,
      brightness: Math.random()
    });
  }
}

function updateStars(dt) {
  for (const s of stars) {
    s.y += s.speed * dt * 60 / 1000;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    s.brightness = 0.4 + 0.6 * Math.abs(Math.sin(Date.now() / 1500 + s.x));
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.brightness * 0.8;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Player ────────────────────────────────────────────────
function createPlayer() {
  return { x: canvas.width/2, y: canvas.height*0.8, w: 36, h: 44, speed: 280, color: '#00ffcc' };
}

function drawPlayer(p) {
  if (invincible > 0 && Math.floor(invincible / 80) % 2 === 0) return;
  const x = p.x, y = p.y, w = p.w, h = p.h;

  // Engine glow
  ctx.save();
  const grad = ctx.createRadialGradient(x, y + h/2, 2, x, y + h/2, 22);
  grad.addColorStop(0, 'rgba(0,200,255,0.6)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x - 22, y, 44, 32);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#0a0a1a';
  ctx.strokeStyle = p.color;
  ctx.lineWidth = 2;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 12;

  ctx.beginPath();
  ctx.moveTo(x, y - h/2);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.lineTo(x + w/3, y + h/2 - 8);
  ctx.lineTo(x, y + h/4);
  ctx.lineTo(x - w/3, y + h/2 - 8);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.ellipse(x, y - 4, 7, 11, 0, 0, Math.PI*2);
  ctx.fill();

  // Wings
  ctx.fillStyle = 'rgba(0,255,204,0.15)';
  ctx.beginPath();
  ctx.moveTo(x - w/3, y + 4); ctx.lineTo(x - w*0.65, y + h/2); ctx.lineTo(x - w/4, y + h/2 - 8); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + w/3, y + 4); ctx.lineTo(x + w*0.65, y + h/2); ctx.lineTo(x + w/4, y + h/2 - 8); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();

  if (shieldActive) {
    ctx.save();
    ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 3;
    ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 20;
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(Date.now()/100);
    ctx.beginPath(); ctx.ellipse(x, y, w*0.9, h*0.9, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ─── Bullets ───────────────────────────────────────────────
function shootBullet(x, y, vy, color, w=4, h=14, dmg=1) {
  bullets.push({ x, y, vy, w, h, color, dmg });
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color; ctx.shadowBlur = 10;
  const g = ctx.createLinearGradient(b.x, b.y - b.h/2, b.x, b.y + b.h/2);
  g.addColorStop(0, b.color); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.roundRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h, 2); ctx.fill();
  ctx.restore();
}

// ─── Enemies ───────────────────────────────────────────────
const ENEMY_TYPES = [
  { w:38, h:22, hp:1, score:100, color:'#ff4466', speed:80, shape:'ufo', shootRate:0.003, bulletSpeed:160 },
  { w:28, h:32, hp:2, score:200, color:'#ff9900', speed:130, shape:'dart', shootRate:0.002, bulletSpeed:180, zigzag:true },
  { w:48, h:40, hp:4, score:400, color:'#aa44ff', speed:55, shape:'tank', shootRate:0.005, bulletSpeed:140 },
];

function spawnEnemy() {
  const t = ENEMY_TYPES[Math.floor(Math.random() * Math.min(ENEMY_TYPES.length, 1 + Math.floor(wave/2)))];
  const x = t.w + Math.random() * (canvas.width - t.w*2);
  enemies.push({
    ...t, x, y: -t.h,
    hp: t.hp + Math.floor(wave/3),
    maxHp: t.hp + Math.floor(wave/3),
    dy: t.speed + wave*5,
    dx: t.zigzag ? (Math.random()>0.5?1:-1)*60 : 0,
    zigPhase: Math.random()*Math.PI*2,
    hitFlash: 0
  });
}

function drawEnemy(e) {
  ctx.save();
  if (e.hitFlash > 0) ctx.filter = 'brightness(3)';
  ctx.shadowColor = e.color; ctx.shadowBlur = 14;

  if (e.shape === 'ufo') {
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
    ctx.beginPath(); ctx.ellipse(e.x, e.y, e.w/2, e.h/2.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.ellipse(e.x, e.y - e.h/5, e.w/3, e.h/2.8, 0, Math.PI, Math.PI*2); ctx.fill();
    for (let i = -1; i <= 1; i++) {
      ctx.fillStyle = `hsl(${(Date.now()/5 + i*120) % 360},100%,70%)`;
      ctx.beginPath(); ctx.arc(e.x + i*12, e.y + 2, 3, 0, Math.PI*2); ctx.fill();
    }
  } else if (e.shape === 'dart') {
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#0a0a1a';
    ctx.strokeStyle = e.color; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x, e.y + e.h/2); ctx.lineTo(e.x - e.w/2, e.y - e.h/2);
    ctx.lineTo(e.x, e.y - e.h/5); ctx.lineTo(e.x + e.w/2, e.y - e.h/2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (e.shape === 'tank') {
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#0a0a1a';
    ctx.strokeStyle = e.color; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.roundRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h, 6); ctx.fill(); ctx.stroke();
    ctx.fillStyle = e.color; ctx.fillRect(e.x - 4, e.y + 4, 8, 16);
    const bw = e.w * 0.8;
    ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.fillRect(e.x - bw/2, e.y - e.h/2 - 8, bw, 4);
    ctx.fillStyle = e.color; ctx.fillRect(e.x - bw/2, e.y - e.h/2 - 8, bw*(e.hp/e.maxHp), 4);
  }
  ctx.restore();
}

// ─── Boss ──────────────────────────────────────────────────
function spawnBoss() {
  bossActive = true;
  boss = {
    x: canvas.width/2, y: -80, w: 100, h: 70,
    hp: 20 + wave*8, maxHp: 20 + wave*8,
    speed: 60, dx: 1, shootTimer: 0, hitFlash: 0, color: '#cc00ff'
  };
  showWaveText('⚠ BOSS ⚠');
}

function drawBoss(b) {
  ctx.save();
  if (b.hitFlash > 0) ctx.filter = 'brightness(3)';
  ctx.shadowColor = b.color; ctx.shadowBlur = 30;
  ctx.fillStyle = '#0a0a1a'; ctx.strokeStyle = b.color; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(b.x, b.y - b.h/2); ctx.lineTo(b.x + b.w/2, b.y);
  ctx.lineTo(b.x + b.w*0.7, b.y + b.h/2); ctx.lineTo(b.x - b.w*0.7, b.y + b.h/2);
  ctx.lineTo(b.x - b.w/2, b.y); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = b.color;
  ctx.beginPath(); ctx.ellipse(b.x, b.y, 24, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath();
  ctx.arc(b.x + Math.sin(Date.now()/300)*4, b.y + Math.cos(Date.now()/400)*3, 4, 0, Math.PI*2); ctx.fill();
  const bw = b.w*1.2;
  ctx.filter = 'none'; ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(200,0,255,0.2)'; ctx.fillRect(b.x - bw/2, b.y - b.h/2 - 14, bw, 7);
  ctx.fillStyle = b.color; ctx.fillRect(b.x - bw/2, b.y - b.h/2 - 14, bw*(b.hp/b.maxHp), 7);
  ctx.strokeStyle = 'rgba(200,0,255,0.5)'; ctx.lineWidth = 1;
  ctx.strokeRect(b.x - bw/2, b.y - b.h/2 - 14, bw, 7);
  ctx.restore();
}

// ─── Particles ─────────────────────────────────────────────
function explode(x, y, color, count=20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random()*Math.PI*2, speed = Math.random()*200+60;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1, decay: Math.random()*1.5+0.8, r: Math.random()*4+1, color });
  }
}

// ─── Powerups ──────────────────────────────────────────────
function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return;
  const types = ['shield','rapid','life'];
  const type = types[Math.floor(Math.random()*types.length)];
  powerups.push({ x, y, type, vy: 80, r: 14,
    color: type==='shield'?'#00aaff':type==='rapid'?'#ffcc00':'#ff4466',
    label: type==='shield'?'🛡':type==='rapid'?'⚡':'❤' });
}

function applyPowerup(p) {
  if (p.type==='shield') { shieldActive=true; setTimeout(()=>shieldActive=false,5000); }
  else if (p.type==='rapid') { rapidFire=4000; }
  else if (p.type==='life') { lives=Math.min(lives+1,5); renderLives(); }
  explode(p.x, p.y, p.color, 15);
}

// ─── Collision ─────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 && ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

// ─── Input: Keyboard ───────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='Space') e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code]=false; });

// ─── Input: Dynamic floating joystick ──────────────────────
// Tap anywhere → joystick appears there, drag to move, moving = auto fire
const joystick = { active: false, id: null, baseX: 0, baseY: 0, dx: 0, dy: 0, moving: false };
const JOYSTICK_RADIUS = 55; // max drag distance

function getWrapperPos(clientX, clientY) {
  const r = wrapper.getBoundingClientRect();
  // Scale from CSS pixels to canvas pixels
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  return { x: (clientX - r.left) * scaleX, y: (clientY - r.top) * scaleY };
}

touchZone.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  if (joystick.active) return; // only one touch for joystick
  const t = e.changedTouches[0];
  joystick.active = true;
  joystick.id = t.identifier;
  joystick.baseX = t.clientX;
  joystick.baseY = t.clientY;
  joystick.dx = 0;
  joystick.dy = 0;
  joystick.moving = false;

  // Show joystick at touch position (CSS coords)
  const r = wrapper.getBoundingClientRect();
  const cx = t.clientX - r.left;
  const cy = t.clientY - r.top;
  jBase.style.left = cx + 'px';
  jBase.style.top = cy + 'px';
  jKnob.style.left = cx + 'px';
  jKnob.style.top = cy + 'px';
  jBase.style.display = 'block';
  jKnob.style.display = 'block';
}, { passive: false });

touchZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== joystick.id) continue;
    const rawDx = t.clientX - joystick.baseX;
    const rawDy = t.clientY - joystick.baseY;
    const dist = Math.hypot(rawDx, rawDy);
    const clamped = Math.min(dist, JOYSTICK_RADIUS);
    const nx = dist > 0 ? rawDx / dist : 0;
    const ny = dist > 0 ? rawDy / dist : 0;
    joystick.dx = nx * (clamped / JOYSTICK_RADIUS);
    joystick.dy = ny * (clamped / JOYSTICK_RADIUS);
    joystick.moving = dist > 6; // threshold before "moving"

    // Move knob visually
    const r = wrapper.getBoundingClientRect();
    const kx = joystick.baseX - r.left + nx * clamped;
    const ky = joystick.baseY - r.top + ny * clamped;
    jKnob.style.left = kx + 'px';
    jKnob.style.top = ky + 'px';
  }
}, { passive: false });

['touchend','touchcancel'].forEach(ev => {
  touchZone.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== joystick.id) continue;
      joystick.active = false;
      joystick.dx = 0; joystick.dy = 0;
      joystick.moving = false;
      jBase.style.display = 'none';
      jKnob.style.display = 'none';
    }
  }, { passive: false });
});

// ─── Wave system ───────────────────────────────────────────
function startWave() {
  waveEnemyCount = 5 + wave*2;
  waveKilled = 0;
  waveEnemiesLeft = waveEnemyCount;
  waveSpawnInterval = Math.max(600, 1800 - wave*80);
  enemySpawnTimer = 0;
  wavePhase = 'spawning';
  showWaveText(`DALGA ${wave}`);
}

function showWaveText(text) {
  const el = document.getElementById('wave-indicator');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 1800);
}

// ─── UI ────────────────────────────────────────────────────
function renderLives() {
  const bar = document.getElementById('livesBar');
  bar.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const h = document.createElement('span');
    h.className = 'heart'; h.textContent = '♥';
    bar.appendChild(h);
  }
}

// ─── Start ─────────────────────────────────────────────────
function startGame() {
  score=0; wave=1; lives=3;
  enemies=[]; bullets=[]; eBullets=[]; particles=[]; powerups=[];
  player = createPlayer();
  shootCooldown=0; invincible=0; shieldActive=false; rapidFire=0;
  bossActive=false; boss=null; wavePhase='spawning';
  state='playing';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('scoreEl').textContent='0';
  document.getElementById('waveEl').textContent='1';
  renderLives();
  initStars();
  startWave();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ─── Main loop ─────────────────────────────────────────────
function loop(ts) {
  if (state !== 'playing') return;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  const ms = dt, s = dt/1000;

  updateStars(dt);

  // ── Player movement ──────────────────────────────────────
  let moveX = 0, moveY = 0;
  if (keys['ArrowLeft']||keys['KeyA']) moveX -= 1;
  if (keys['ArrowRight']||keys['KeyD']) moveX += 1;
  if (keys['ArrowUp']||keys['KeyW']) moveY -= 1;
  if (keys['ArrowDown']||keys['KeyS']) moveY += 1;

  if (joystick.active) {
    moveX += joystick.dx;
    moveY += joystick.dy;
  }

  const len = Math.hypot(moveX, moveY);
  if (len > 1) { moveX/=len; moveY/=len; }

  player.x += moveX * player.speed * s;
  player.y += moveY * player.speed * s;
  player.x = Math.max(player.w/2, Math.min(canvas.width - player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(canvas.height - player.h/2, player.y));

  // ── Shooting ─────────────────────────────────────────────
  // Fire when: joystick moving, keyboard fire key, or rapidFire active
  const isMovingTouch = joystick.active && joystick.moving;
  const isKeyFiring = keys['Space'] || keys['KeyZ'];
  const fireCooldown = rapidFire > 0 ? 80 : 220;

  if (shootCooldown > 0) shootCooldown -= ms;
  if ((isMovingTouch || isKeyFiring) && shootCooldown <= 0) {
    shootBullet(player.x, player.y - player.h/2, -620, '#00ffcc');
    if (rapidFire > 0) {
      shootBullet(player.x - 12, player.y - player.h/4, -580, '#00ccff', 3);
      shootBullet(player.x + 12, player.y - player.h/4, -580, '#00ccff', 3);
    }
    shootCooldown = fireCooldown;
  }
  if (rapidFire > 0) rapidFire -= ms;
  if (invincible > 0) invincible -= ms;

  // ── Bullets ───────────────────────────────────────────────
  bullets = bullets.filter(b => { b.y += b.vy * s; return b.y > -20; });

  // ── Enemy bullets ─────────────────────────────────────────
  eBullets = eBullets.filter(b => {
    b.x += (b.vx||0)*s; b.y += b.vy*s;
    if (b.y > canvas.height+20) return false;
    if (invincible<=0 && !shieldActive && rectsOverlap(player.x,player.y,player.w,player.h,b.x,b.y,6,14)) {
      hitPlayer(); return false;
    }
    if (invincible<=0 && shieldActive && rectsOverlap(player.x,player.y,player.w*1.8,player.h*1.8,b.x,b.y,6,14)) {
      explode(b.x,b.y,'#00aaff',6); return false;
    }
    return true;
  });

  // ── Wave state machine ────────────────────────────────────
  if (!bossActive) {
    if (wavePhase==='spawning') {
      if (waveEnemiesLeft > 0) {
        enemySpawnTimer -= ms;
        if (enemySpawnTimer <= 0) { spawnEnemy(); waveEnemiesLeft--; enemySpawnTimer = waveSpawnInterval; }
      } else {
        wavePhase = 'waiting';
      }
    } else if (wavePhase==='waiting') {
      if (enemies.length === 0) {
        if (wave % 3 === 0) { spawnBoss(); wavePhase='boss'; }
        else { wave++; document.getElementById('waveEl').textContent=wave; waveCooldown=1800; wavePhase='cooldown'; }
      }
    } else if (wavePhase==='cooldown') {
      waveCooldown -= ms;
      if (waveCooldown <= 0) startWave();
    }
  }

  // ── Boss ──────────────────────────────────────────────────
  if (bossActive && boss) {
    if (boss.y < 100) boss.y += boss.speed*s;
    boss.x += boss.dx*(boss.speed*0.8)*s;
    if (boss.x > canvas.width-boss.w/2 || boss.x < boss.w/2) boss.dx *= -1;
    boss.shootTimer -= ms;
    if (boss.hitFlash>0) boss.hitFlash -= ms;
    if (boss.shootTimer <= 0) {
      boss.shootTimer = Math.max(400, 900-wave*30);
      for (let a=-1;a<=1;a++) eBullets.push({x:boss.x+a*20,y:boss.y+boss.h/2,vx:a*80,vy:220,color:'#cc00ff'});
      if (wave>=3) eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:0,vy:300,color:'#ff00cc'});
    }
    bullets = bullets.filter(b => {
      if (rectsOverlap(boss.x,boss.y,boss.w,boss.h,b.x,b.y,b.w,b.h)) {
        boss.hp -= b.dmg; boss.hitFlash=80; explode(b.x,b.y,'#cc00ff',5);
        if (boss.hp <= 0) {
          explode(boss.x,boss.y,'#cc00ff',50);
          score += 2000+wave*500; spawnPowerup(boss.x,boss.y);
          bossActive=false; boss=null;
          wave++; document.getElementById('waveEl').textContent=wave;
          waveCooldown=2000; wavePhase='cooldown';
        }
        return false;
      }
      return true;
    });
    if (invincible<=0 && !shieldActive && rectsOverlap(player.x,player.y,player.w,player.h,boss.x,boss.y,boss.w,boss.h)) hitPlayer();
  }

  // ── Enemies ───────────────────────────────────────────────
  enemies = enemies.filter(e => {
    e.y += e.dy*s;
    if (e.zigzag) e.x += e.dx*Math.sin(Date.now()/400+e.zigPhase)*1.2;
    if (e.hitFlash>0) e.hitFlash -= ms;
    e.x = Math.max(e.w/2, Math.min(canvas.width-e.w/2, e.x));
    if (Math.random() < e.shootRate*ms) {
      const angle = Math.atan2(player.y-e.y, player.x-e.x);
      eBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(angle)*e.bulletSpeed*0.4,vy:e.bulletSpeed,color:e.color});
    }
    let alive = true;
    bullets = bullets.filter(b => {
      if (alive && rectsOverlap(e.x,e.y,e.w,e.h,b.x,b.y,b.w,b.h)) {
        e.hp -= b.dmg; e.hitFlash=80; explode(b.x,b.y,e.color,5);
        if (e.hp<=0) { explode(e.x,e.y,e.color,20); score+=e.score+wave*20; waveKilled++; spawnPowerup(e.x,e.y); alive=false; }
        return false;
      }
      return true;
    });
    if (!alive) return false;
    if (invincible<=0 && !shieldActive && rectsOverlap(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)) {
      hitPlayer(); explode(e.x,e.y,e.color,15); return false;
    }
    return e.y < canvas.height+50;
  });

  // ── Powerups ──────────────────────────────────────────────
  powerups = powerups.filter(p => {
    p.y += p.vy*s;
    if (rectsOverlap(player.x,player.y,player.w*1.3,player.h*1.3,p.x,p.y,p.r*2,p.r*2)) { applyPowerup(p); return false; }
    return p.y < canvas.height+30;
  });

  // ── Particles ─────────────────────────────────────────────
  particles = particles.filter(p => {
    p.x+=p.vx*s; p.y+=p.vy*s; p.vx*=0.96; p.vy*=0.96; p.life-=p.decay*s; return p.life>0;
  });

  document.getElementById('scoreEl').textContent = score;
}

function hitPlayer() {
  if (invincible>0) return;
  lives--; renderLives(); invincible=1800;
  explode(player.x,player.y,'#ff4466',12);
  if (lives<=0) gameOver();
}

function gameOver() {
  state='menu';
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlayScore').style.display='block';
  document.getElementById('overlayScore').textContent=`SKOR: ${score}  |  DALGA: ${wave}`;
  document.getElementById('startBtn').textContent='YENİDEN OYNA';
  jBase.style.display='none'; jKnob.style.display='none';
}

function draw() {
  const bg = ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,'#000008'); bg.addColorStop(1,'#000018');
  ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

  drawStars();

  ctx.save(); ctx.globalAlpha=0.06;
  const neb=ctx.createRadialGradient(canvas.width*0.7,canvas.height*0.3,10,canvas.width*0.7,canvas.height*0.3,200);
  neb.addColorStop(0,'#aa00ff'); neb.addColorStop(1,'transparent');
  ctx.fillStyle=neb; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.restore();

  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
  }

  for (const p of powerups) {
    ctx.save(); ctx.shadowColor=p.color; ctx.shadowBlur=15;
    ctx.strokeStyle=p.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.2+0.1*Math.sin(Date.now()/200); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.font=`${p.r*1.2}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.label,p.x,p.y); ctx.restore();
  }

  for (const e of enemies) drawEnemy(e);
  if (bossActive && boss) drawBoss(boss);

  for (const b of eBullets) {
    ctx.save(); ctx.shadowColor=b.color; ctx.shadowBlur=10; ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill(); ctx.restore();
  }

  for (const b of bullets) drawBullet(b);

  if (state==='playing') drawPlayer(player);

  // Scanlines
  ctx.save(); ctx.globalAlpha=0.025;
  for (let y=0;y<canvas.height;y+=3) { ctx.fillStyle='#000'; ctx.fillRect(0,y,canvas.width,1); }
  ctx.restore();
}

// Start menu loop
initStars();
(function menuLoop() {
  if (state!=='menu') return;
  updateStars(16); draw();
  requestAnimationFrame(menuLoop);
})();
</script>
