<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GEORIFT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

/* ── TEMEL ─────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#000;display:flex;align-items:center;justify-content:center;width:100vw;height:100dvh;overflow:hidden;font-family:'Orbitron',monospace;}
#gameWrapper{position:relative;width:100vw;height:100dvh;}
canvas{display:block;width:100%;height:100%;}

/* ── OYUN İÇİ UI ────────────────────────────────────── */
#ui{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;}
.stat{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,12px);color:#00ffcc;text-shadow:0 0 8px #00ffcc;letter-spacing:1px;}
.stat span{color:#fff;font-size:1.3em;}
#livesBar{display:flex;gap:3px;justify-content:flex-end;}
.heart{font-size:clamp(11px,2.8vw,15px);filter:drop-shadow(0 0 4px #ff4466);}
#comboEl{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(14px,4vw,22px);color:#ffcc00;text-shadow:0 0 15px #ffcc00,0 0 30px #ff8800;pointer-events:none;z-index:12;opacity:0;transition:opacity 0.3s;letter-spacing:2px;}
#weaponEl{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,11px);color:#00ffcc;text-shadow:0 0 6px #00ffcc;pointer-events:none;z-index:12;letter-spacing:2px;}
#wave-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(18px,5.5vw,30px);font-weight:900;color:#fff;text-shadow:0 0 20px #ff6600,0 0 40px #ff3300;letter-spacing:3px;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.3s;text-align:center;}
#dailyEl{position:absolute;bottom:28px;left:8px;right:8px;font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.9vw,10px);color:rgba(255,200,0,0.7);pointer-events:none;z-index:12;line-height:1.6;}
#slowmoFlash{position:absolute;inset:0;background:rgba(255,255,255,0);pointer-events:none;z-index:14;transition:background 0.1s;}

/* ── JOYSTICK ──────────────────────────────────────── */
#touchZone{position:absolute;inset:0;z-index:10;touch-action:none;}
#joystickBase{position:absolute;width:110px;height:110px;border-radius:50%;border:2px solid rgba(0,255,204,0.3);background:rgba(0,255,204,0.05);pointer-events:none;display:none;transform:translate(-50%,-50%);z-index:11;}
#joystickKnob{position:absolute;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ffcc,#007755);box-shadow:0 0 16px rgba(0,255,204,0.8);pointer-events:none;transform:translate(-50%,-50%);z-index:12;display:none;}

/* ── MENÜ OVERLAY ──────────────────────────────────── */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,0.9);z-index:20;gap:10px;backdrop-filter:blur(3px);overflow-y:auto;padding:20px 0;}
#overlay.hidden{display:none;}
.title-main{font-size:clamp(26px,8vw,50px);font-weight:900;color:#fff;letter-spacing:4px;text-align:center;text-shadow:0 0 20px #00ffcc,0 0 40px #0077ff;line-height:1;}
.title-sub{font-size:clamp(9px,2.5vw,13px);color:#00ffcc;letter-spacing:6px;font-family:'Share Tech Mono',monospace;text-shadow:0 0 8px #00ffcc;}
.score-display{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,3vw,15px);color:#ffcc00;text-shadow:0 0 10px #ffcc00;text-align:center;line-height:1.8;white-space:pre-line;}
.btn{margin-top:6px;padding:12px 36px;border:2px solid #00ffcc;background:transparent;color:#00ffcc;font-family:'Orbitron',monospace;font-size:clamp(12px,3vw,15px);font-weight:700;letter-spacing:3px;cursor:pointer;text-transform:uppercase;overflow:hidden;transition:all 0.2s;box-shadow:0 0 20px rgba(0,255,204,0.3);}
.btn:active{background:rgba(0,255,204,0.15);transform:scale(0.97);}
.btn:disabled{opacity:0.35;cursor:not-allowed;border-color:#555;color:#555;box-shadow:none;}
.hint{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2vw,10px);color:rgba(0,255,204,0.45);text-align:center;letter-spacing:1px;line-height:1.9;}
#scoreboardEl{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,11px);color:rgba(0,255,204,0.7);text-align:center;line-height:1.9;border-top:1px solid rgba(0,255,204,0.2);padding-top:8px;width:80%;white-space:pre-line;}

/* ── HANGAR OVERLAY ────────────────────────────────── */
#hangarOverlay{position:absolute;inset:0;background:rgba(0,0,12,0.97);z-index:25;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#hangarOverlay.hidden{display:none;}
.hangar-wrap{width:94%;max-height:94%;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.hangar-header{text-align:center;}
.hangar-welcome{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2vw,10px);color:rgba(0,255,204,0.6);letter-spacing:2px;margin-top:2px;}
.hangar-body{display:flex;gap:8px;flex:1;min-height:0;}
.hangar-left{display:flex;flex-direction:column;gap:5px;width:34%;}
.hangar-center{display:flex;flex-direction:column;align-items:center;gap:6px;width:30%;}
.hangar-right{flex:1;display:flex;flex-direction:column;gap:5px;font-family:'Share Tech Mono',monospace;}
.hangar-footer{display:flex;gap:8px;justify-content:center;padding-bottom:4px;}

/* Gemi listesi butonları */
.hangar-ship-btn{padding:7px 10px;border:1px solid rgba(0,255,204,0.25);background:rgba(0,255,204,0.04);cursor:pointer;transition:all 0.18s;border-radius:3px;}
.hangar-ship-btn:hover:not(.locked){border-color:rgba(0,255,204,0.6);background:rgba(0,255,204,0.1);}
.hangar-ship-btn.selected{border-color:#00ffcc;background:rgba(0,255,204,0.15);box-shadow:0 0 10px rgba(0,255,204,0.3);}
.hangar-ship-btn.locked{opacity:0.5;cursor:not-allowed;}
.hship-name{font-family:'Orbitron',monospace;font-size:clamp(9px,2.5vw,12px);color:#00ffcc;display:block;letter-spacing:2px;}
.hship-lock{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.8vw,9px);color:rgba(255,100,0,0.7);display:block;margin-top:2px;}

/* Hangar canvas önizleme */
#hangarCanvas{border:1px solid rgba(0,255,204,0.2);border-radius:4px;background:rgba(0,0,20,0.6);}

/* Skin butonları */
.hangar-skins{display:flex;gap:5px;}
.skin-btn{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.15s;padding:0;}
.skin-btn.skin-active{border-color:#fff;transform:scale(1.2);}

/* Detay kartı */
.hangar-ship-name{font-family:'Orbitron',monospace;font-size:clamp(12px,3.5vw,17px);font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 10px #00ffcc;}
.hangar-ship-desc{font-size:clamp(7px,1.8vw,9px);color:rgba(200,200,255,0.7);line-height:1.5;margin-top:2px;}
.hangar-passive{font-size:clamp(8px,2vw,10px);color:#ffcc00;text-shadow:0 0 6px #ffcc00;margin-top:4px;}
.hangar-mult{font-size:clamp(8px,1.9vw,10px);color:rgba(0,255,204,0.7);margin-top:2px;}
.hangar-stats{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.stat-row{display:flex;align-items:center;gap:5px;}
.stat-label{font-size:clamp(7px,1.8vw,9px);color:rgba(0,255,204,0.6);width:32px;}
.stat-bar{font-size:clamp(8px,2vw,11px);color:#00ffcc;letter-spacing:1px;text-shadow:0 0 6px #00ffcc;}

.btn-back{border-color:rgba(0,255,204,0.4);color:rgba(0,255,204,0.6);padding:10px 24px;font-size:clamp(10px,2.5vw,12px);}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <!-- Oyun içi UI -->
  <div id="ui">
    <div class="stat">SKOR<br><span id="scoreEl">0</span></div>
    <div class="stat" style="text-align:center;">DALGA<br><span id="waveEl">1</span></div>
    <div style="text-align:right;">
      <div class="stat">CAN</div>
      <div id="livesBar"></div>
    </div>
  </div>
  <div id="comboEl"></div>
  <div id="weaponEl">● STANDART</div>
  <div id="wave-indicator"></div>
  <div id="dailyEl"></div>
  <div id="slowmoFlash"></div>

  <!-- Ana menü -->
  <div id="overlay">
    <div class="title-sub">— UZAY MİSYONU —</div>
    <div class="title-main">GEO<br>RIFT</div>
    <div class="score-display" id="overlayScore" style="display:none"></div>
    <div id="scoreboardEl" style="display:none"></div>
    <button class="btn" id="startBtn">HANGAR</button>
    <div class="hint">
      📱 Ekrana bas &amp; sürükle → hareket + ateş<br>
      Çift dokun → DASH kaçış hamlesi<br>
      🖥️ WASD / Ok + Boşluk + Shift(dash)
    </div>
  </div>

  <!-- Joystick -->
  <div id="joystickBase"></div>
  <div id="joystickKnob"></div>
  <div id="touchZone"></div>
</div>

<!-- Modüller: bağımlılık sırasına göre -->
<script src="ships.js"></script>      <!-- Gemi tanımları, unlock, hangar UI -->
<script src="scoreboard.js"></script>  <!-- Skor kaydet/oku -->
<script src="missions.js"></script>    <!-- Günlük görevler -->
<script src="environment.js"></script> <!-- Yıldız, asteroid, partikül, powerup -->
<script src="enemies.js"></script>     <!-- Düşman tipleri ve boss -->
<script src="weapons.js"></script>     <!-- Silah sistemi -->
<script src="passives.js"></script>    <!-- Pasif yetenekler -->
<script src="player.js"></script>      <!-- Oyuncu çizimi ve dash -->
<script src="input.js"></script>       <!-- Klavye & dokunmatik -->
<script src="game.js"></script>        <!-- Ana döngü (en son) -->
</body>
</html>
