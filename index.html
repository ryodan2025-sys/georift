<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GEORIFT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

/* ── TEMEL ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#000;display:flex;align-items:center;justify-content:center;width:100vw;height:100dvh;overflow:hidden;font-family:'Orbitron',monospace;}
#gameWrapper{position:relative;width:100vw;height:100dvh;}
canvas{display:block;width:100%;height:100%;}

/* ── OYUN İÇİ UI ────────────────────────────────────── */
#ui{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;}
.stat{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,13px);color:#00ffcc;text-shadow:0 0 8px #00ffcc;letter-spacing:1px;}
.stat span{color:#fff;font-size:1.3em;}
#livesBar{display:flex;gap:3px;justify-content:flex-end;}
.heart{font-size:clamp(11px,3vw,16px);filter:drop-shadow(0 0 4px #ff4466);}

/* Pause butonu */
#pauseBtn{position:absolute;top:10px;right:14px;z-index:16;background:transparent;border:1px solid rgba(0,255,204,0.35);color:rgba(0,255,204,0.7);font-family:'Orbitron',monospace;font-size:clamp(9px,2.5vw,12px);padding:4px 9px;cursor:pointer;letter-spacing:2px;pointer-events:all;}
#pauseBtn:active{background:rgba(0,255,204,0.15);}

#comboEl{position:absolute;top:62px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(14px,4vw,22px);color:#ffcc00;text-shadow:0 0 15px #ffcc00,0 0 30px #ff8800;pointer-events:none;z-index:12;opacity:0;transition:opacity 0.3s;letter-spacing:2px;}
#weaponEl{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,12px);color:#00ffcc;text-shadow:0 0 6px #00ffcc;pointer-events:none;z-index:12;letter-spacing:2px;}
#wave-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(18px,6vw,32px);font-weight:900;color:#fff;text-shadow:0 0 20px #ff6600,0 0 40px #ff3300;letter-spacing:3px;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.3s;text-align:center;}
#dailyEl{position:absolute;bottom:30px;left:8px;right:8px;font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.9vw,10px);color:rgba(255,200,0,0.65);pointer-events:none;z-index:12;line-height:1.65;}
#slowmoFlash{position:absolute;inset:0;background:rgba(255,255,255,0);pointer-events:none;z-index:14;transition:background 0.12s;}

/* ── JOYSTICK ───────────────────────────────────────── */
#touchZone{position:absolute;inset:0;z-index:10;touch-action:none;}
#joystickBase{position:absolute;width:110px;height:110px;border-radius:50%;border:2px solid rgba(0,255,204,0.28);background:rgba(0,255,204,0.04);pointer-events:none;display:none;transform:translate(-50%,-50%);z-index:11;}
#joystickKnob{position:absolute;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00ffcc,#007755);box-shadow:0 0 16px rgba(0,255,204,0.7);pointer-events:none;transform:translate(-50%,-50%);z-index:12;display:none;}

/* ── PAUSE OVERLAY ──────────────────────────────────── */
.pause-overlay{position:absolute;inset:0;background:rgba(0,0,10,0.88);z-index:30;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.pause-overlay.hidden{display:none;}
.pause-box{display:flex;flex-direction:column;align-items:center;gap:14px;}
.pause-title{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,3vw,14px);color:#00ffcc;letter-spacing:5px;text-shadow:0 0 10px #00ffcc;margin-bottom:8px;}
.pause-mute{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,12px);color:rgba(0,255,204,0.55);cursor:pointer;margin-top:6px;letter-spacing:2px;}
.pause-mute:active{opacity:0.7;}

/* ── ANA MENÜ ───────────────────────────────────────── */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,0.92);z-index:20;gap:10px;backdrop-filter:blur(4px);overflow-y:auto;padding:20px 0;}
#overlay.hidden{display:none;}
.title-main{font-size:clamp(28px,9vw,54px);font-weight:900;color:#fff;letter-spacing:4px;text-align:center;text-shadow:0 0 22px #00ffcc,0 0 44px #0077ff;line-height:1;}
.title-sub{font-size:clamp(9px,2.5vw,13px);color:#00ffcc;letter-spacing:7px;font-family:'Share Tech Mono',monospace;text-shadow:0 0 8px #00ffcc;}
.score-display{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,3vw,15px);color:#ffcc00;text-shadow:0 0 10px #ffcc00;text-align:center;line-height:1.8;white-space:pre-line;}
.btn{margin-top:6px;padding:12px 38px;border:2px solid #00ffcc;background:transparent;color:#00ffcc;font-family:'Orbitron',monospace;font-size:clamp(12px,3.2vw,16px);font-weight:700;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;box-shadow:0 0 22px rgba(0,255,204,0.28);}
.btn:active{background:rgba(0,255,204,0.15);transform:scale(0.97);}
.btn:disabled{opacity:0.32;cursor:not-allowed;border-color:#444;color:#444;box-shadow:none;}
.hint{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2vw,10px);color:rgba(0,255,204,0.42);text-align:center;letter-spacing:1px;line-height:2;}
#scoreboardEl{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.2vw,11px);color:rgba(0,255,204,0.65);text-align:center;line-height:2;border-top:1px solid rgba(0,255,204,0.2);padding-top:8px;width:82%;white-space:pre-line;}

/* ── HANGAR ─────────────────────────────────────────── */
#hangarOverlay{position:absolute;inset:0;background:rgba(0,0,12,0.97);z-index:25;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
#hangarOverlay.hidden{display:none;}
.hangar-wrap{width:94%;max-height:96%;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.hangar-header{text-align:center;}
.hangar-welcome{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2vw,10px);color:rgba(0,255,204,0.55);letter-spacing:2px;margin-top:2px;}
.hangar-body{display:flex;gap:8px;flex:1;min-height:0;}
.hangar-left{display:flex;flex-direction:column;gap:5px;width:34%;}
.hangar-center{display:flex;flex-direction:column;align-items:center;gap:6px;width:30%;}
.hangar-right{flex:1;display:flex;flex-direction:column;gap:5px;font-family:'Share Tech Mono',monospace;}
.hangar-footer{display:flex;gap:8px;justify-content:center;padding-bottom:4px;}
.hangar-ship-btn{padding:7px 10px;border:1px solid rgba(0,255,204,0.22);background:rgba(0,255,204,0.04);cursor:pointer;transition:all 0.18s;border-radius:3px;}
.hangar-ship-btn:hover:not(.locked){border-color:rgba(0,255,204,0.55);background:rgba(0,255,204,0.10);}
.hangar-ship-btn.selected{border-color:#00ffcc;background:rgba(0,255,204,0.14);box-shadow:0 0 10px rgba(0,255,204,0.28);}
.hangar-ship-btn.locked{opacity:0.45;cursor:not-allowed;}
.hship-name{font-family:'Orbitron',monospace;font-size:clamp(9px,2.5vw,12px);color:#00ffcc;display:block;letter-spacing:2px;}
.hship-lock{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.8vw,9px);color:rgba(255,100,0,0.65);display:block;margin-top:2px;}
#hangarCanvas{border:1px solid rgba(0,255,204,0.18);border-radius:4px;background:rgba(0,0,20,0.6);}
.hangar-skins{display:flex;gap:5px;}
.skin-btn{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.18);cursor:pointer;transition:all 0.14s;padding:0;}
.skin-btn.skin-active{border-color:#fff;transform:scale(1.22);}
.hangar-ship-name{font-family:'Orbitron',monospace;font-size:clamp(12px,3.5vw,17px);font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 10px #00ffcc;}
.hangar-ship-desc{font-size:clamp(7px,1.8vw,9px);color:rgba(200,200,255,0.65);line-height:1.5;margin-top:2px;}
.hangar-passive{font-size:clamp(8px,2vw,10px);color:#ffcc00;text-shadow:0 0 6px #ffcc00;margin-top:4px;}
.hangar-mult{font-size:clamp(8px,1.9vw,10px);color:rgba(0,255,204,0.65);margin-top:2px;}
.hangar-stats{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.stat-row{display:flex;align-items:center;gap:5px;}
.stat-label{font-size:clamp(7px,1.8vw,9px);color:rgba(0,255,204,0.55);width:32px;}
.stat-bar{font-size:clamp(8px,2vw,11px);color:#00ffcc;letter-spacing:1px;text-shadow:0 0 6px #00ffcc;}
.btn-back{border-color:rgba(0,255,204,0.35);color:rgba(0,255,204,0.55);padding:10px 24px;font-size:clamp(10px,2.5vw,12px);}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <!-- Oyun içi UI -->
  <div id="ui">
    <div class="stat">SKOR<br><span id="scoreEl">0</span></div>
    <div class="stat" style="text-align:center;">DALGA<br><span id="waveEl">1</span></div>
    <div style="text-align:right;">
      <div class="stat">CAN</div>
      <div id="livesBar"></div>
    </div>
  </div>

  <!-- Pause butonu (sağ üst, UI'ın üzerinde) -->
  <button id="pauseBtn">II</button>

  <div id="comboEl"></div>
  <div id="weaponEl">● STANDART</div>
  <div id="wave-indicator"></div>
  <div id="dailyEl"></div>
  <div id="slowmoFlash"></div>

  <!-- Ana menü -->
  <div id="overlay">
    <div class="title-sub">— UZAY MİSYONU —</div>
    <div class="title-main">GEO<br>RIFT</div>
    <div class="score-display" id="overlayScore" style="display:none"></div>
    <div id="scoreboardEl" style="display:none"></div>
    <button class="btn" id="startBtn">HANGAR</button>
    <div class="hint">
      📱 Sürükle → hareket &amp; ateş &nbsp;|&nbsp; Çift dok → DASH<br>
      🖥️ WASD + Boşluk + Shift(dash) + P(pause)
    </div>
  </div>

  <!-- Joystick -->
  <div id="joystickBase"></div>
  <div id="joystickKnob"></div>
  <div id="touchZone"></div>
</div>

<!-- Modüller – bağımlılık sırasına göre -->
<script src="audio.js"></script>
<script src="ships.js"></script>
<script src="scoreboard.js"></script>
<script src="missions.js"></script>
<script src="environment.js"></script>
<script src="enemies.js"></script>
<script src="weapons.js"></script>
<script src="passives.js"></script>
<script src="player.js"></script>
<script src="input.js"></script>
<script src="game.js"></script>
</body>
</html>
